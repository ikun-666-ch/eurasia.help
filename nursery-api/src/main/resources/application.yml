spring:
  application:
    name: nursery-api
  profiles:
    active: local
  config:
    import: optional:classpath:application-local.override.yml
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.eurasia.nursery.domain.entity

nursery:
  jwt:
    secret: change-me-in-production-use-long-random-string-32chars+
    ttl-seconds: 86400
  cors:
    allowed-origins: http://127.0.0.1:5173,http://localhost:5173,https://eurasia.help
  data-dir: ./data
  admin-register-key-suffix: "206116"
  ihuyi:
    account: ""
    password: ""
  auth-phones: []
  auth-phone-usernames: []
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    api-url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
