# 可选：不用 MySQL 时用 H2 内存库
# 启动：mvn spring-boot:run -Dspring-boot.run.profiles=local-h2

spring:
  datasource:
    url: jdbc:h2:mem:nursery_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
