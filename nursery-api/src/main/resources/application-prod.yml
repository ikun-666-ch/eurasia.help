spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:nursery_db}?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

nursery:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-random-string-32chars+}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://eurasia.help}
